server:
  servlet:
    context-path: /permission-service
  port: 8086

logging:
  level:
    root: WARN
    org.budgetanalyzer: TRACE

spring:
  application:
    name: permission-service

  jackson:
    default-property-inclusion: non_null  # Exclude null fields from JSON
    serialization:
      indent-output: true                 # Pretty print JSON
      write-dates-as-timestamps: false    # Use ISO-8601 format for dates
    date-format: com.fasterxml.jackson.databind.util.StdDateFormat

  datasource:
    url: jdbc:postgresql://localhost:5432/permission
    username: ${SPRING_DATASOURCE_USERNAME:permission_service}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway manages schema, JPA validates it matches entities
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

session-gateway:
  base-url: ${SESSION_GATEWAY_BASE_URL:http://localhost:8085/session-gateway}
  revocation:
    max-attempts: ${SESSION_GATEWAY_REVOCATION_MAX_ATTEMPTS:3}
    initial-delay: ${SESSION_GATEWAY_REVOCATION_INITIAL_DELAY:200ms}
    multiplier: ${SESSION_GATEWAY_REVOCATION_MULTIPLIER:2.0}
    max-delay: ${SESSION_GATEWAY_REVOCATION_MAX_DELAY:2s}

budgetanalyzer:
  service:
    http-logging:
      enabled: true
      log-level: DEBUG
      include-request-body: true
      include-response-body: true
      max-body-size: 10000
      # Default exclude-patterns: /actuator/**, /swagger-ui/**, /v3/api-docs/**
