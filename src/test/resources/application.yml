spring:
  application:
    name: permission-service-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  jackson:
    default-property-inclusion: non_null
    serialization:
      indent-output: true
      write-dates-as-timestamps: false

server:
  servlet:
    context-path: /permission-service

session-gateway:
  base-url: http://localhost:8085/session-gateway
  revocation:
    max-attempts: 3
    initial-delay: 0ms
    multiplier: 1.0
    max-delay: 0ms

logging:
  level:
    root: WARN
    org.budgetanalyzer: DEBUG
